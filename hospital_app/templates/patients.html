<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Patients List</title>
</head>
<body>
    <h1>Patients List</h1>

    <ul>
        {% for patient in patients %}
            <li>{{ patient.first_name }} {{ patient.last_name }}</li>
        {% empty %}
            <li>No patients available.</li>
        {% endfor %}
    </ul>

    <a href="/">Back to Home</a>
</body>
</html>
