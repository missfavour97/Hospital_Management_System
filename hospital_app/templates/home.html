<!DOCTYPE html>
<html>
<head>
    <title>Hospital System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            color: #2c3e50;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Hospital Management System</h1>
    <p>Manage patients and doctors easily.</p>

<div class="text-center mt-4">

    <a href="/patients/" class="btn btn-primary m-2">View Patients</a>
    <a href="/add-patient/" class="btn btn-success m-2">Add Patient</a>

    <br>

    <a href="/doctors/" class="btn btn-primary m-2">View Doctors</a>
    <a href="/add-doctor/" class="btn btn-success m-2">Add Doctor</a>

    <br>

    <a href="/appointments/" class="btn btn-primary m-2">View Appointments</a>
    <a href="/add-appointment/" class="btn btn-success m-2">Add Appointment</a>

    <br>

    <a href="/departments/" class="btn btn-primary m-2">View Departments</a>
    <a href="/add-department/" class="btn btn-success m-2">Add Department</a>

    <br>

    <a href="/prescriptions/" class="btn btn-primary m-2">View Prescriptions</a>
    <a href="/add-prescription/" class="btn btn-success m-2">Add Prescription</a>

</div>
</body>
</html>
