<!DOCTYPE html>
<html>
<head>
    <title>Doctors List</title>
</head>
<body>

<h1>Doctors List</h1>

<ul>
    {% for doctor in doctors %}
        <li>{{ doctor.first_name }} {{ doctor.last_name }} - {{ doctor.specialty }}</li>
    {% empty %}
        <li>No doctors available.</li>
    {% endfor %}
</ul>

<a href="/">Back to Home</a>

</body>
</html>
